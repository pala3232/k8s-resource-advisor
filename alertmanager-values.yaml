alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-slack
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
    - name: slack
      slack_configs:
      - api_url_secret:
          name: alertmanager-slack
          key: webhook-url
        channel: '#alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
